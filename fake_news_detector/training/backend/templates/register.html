<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Fake News Detector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <span class="logo-icon">📰</span>
      <h1>Fake News Detector</h1>
    </div>

    <h2 class="auth-title">Create Account</h2>
    <p class="auth-subtitle">Join us to start detecting fake news</p>

    <!-- Alerts -->
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" name="username" class="form-input" required minlength="3"
          placeholder="At least 3 characters">
      </div>
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-input" required placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input" required minlength="6"
          placeholder="At least 6 characters">
      </div>
      <div class="form-group">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="form-input" required
          placeholder="Confirm new password">
      </div>
      <button type="submit" class="btn-primary" style="margin-top:8px;">Create Account</button>
    </form>

    <div class="auth-footer" style="margin-top:24px; padding-top:20px; border-top:1px solid #e5e5e5;">
      Already have an account? <a href="/login">Sign In</a>
    </div>
  </div>
</div>

<script>
  document.getElementById('confirm_password').addEventListener('input', function () {
    const pw = document.getElementById('password').value;
    this.setCustomValidity(pw !== this.value ? 'Passwords do not match' : '');
  });
</script>
</body>
</html>
