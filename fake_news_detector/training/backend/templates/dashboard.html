<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #dc2626 100%);
            color: white;
            margin-bottom: 40px;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.2);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .pipeline-flow {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .pipeline-flow h2 {
            color: #ff6b35;
            margin-bottom: 20px;
        }

        .flow-steps {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .step {
            flex: 1;
            min-width: 150px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #dc2626 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            position: relative;
        }

        .step::after {
            content: '→';
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            color: #ff6b35;
        }

        .step:last-child::after {
            display: none;
        }

        .step-number {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .step-name {
            font-size: 14px;
        }

        .input-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .input-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #dc2626 100%);
            color: white;
        }

        .input-content {
            display: none;
        }

        .input-content.active {
            display: block;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            margin-bottom: 15px;
            resize: vertical;
        }

        textarea {
            min-height: 150px;
        }

        .analyze-btn {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #dc2626 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
        }

        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-header {
            text-align: center;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .result-header.fake {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
        }

        .result-header.real {
            background: linear-gradient(135deg, #51cf66 0%, #37b24d 100%);
            color: white;
        }

        .result-header.uncertain {
            background: linear-gradient(135deg, #ffd43b 0%, #fab005 100%);
            color: white;
        }

        .result-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .result-status {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-confidence {
            font-size: 24px;
        }

        .result-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .detail-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }

        .detail-card h3 {
            color: #ff6b35;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .detail-item {
            margin-bottom: 10px;
            padding: 8px;
            background: white;
            border-radius: 5px;
        }

        .signal-list {
            list-style: none;
        }

        .signal-list li {
            padding: 8px;
            margin-bottom: 5px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 4px;
        }

        .recommendations {
            background: #e7f5ff;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #339af0;
        }

        .recommendations h3 {
            color: #1971c2;
            margin-bottom: 15px;
        }

        .recommendations ul {
            list-style: none;
        }

        .recommendations li {
            padding: 8px 0;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Fake News Detection System</h1>
            <p>Advanced AI-Powered News Verification</p>
        </div>

        <div class="pipeline-flow">
            <h2>System Pipeline</h2>
            <div class="flow-steps">
                <div class="step">
                    <div class="step-number">1️⃣</div>
                    <div class="step-name">Data Collection</div>
                </div>
                <div class="step">
                    <div class="step-number">2️⃣</div>
                    <div class="step-name">Preprocessing</div>
                </div>
                <div class="step">
                    <div class="step-number">3️⃣</div>
                    <div class="step-name">Feature Extraction</div>
                </div>
                <div class="step">
                    <div class="step-number">4️⃣</div>
                    <div class="step-name">ML Classification</div>
                </div>
                <div class="step">
                    <div class="step-number">5️⃣</div>
                    <div class="step-name">Verification</div>
                </div>
                <div class="step">
                    <div class="step-number">6️⃣</div>
                    <div class="step-name">Dashboard</div>
                </div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-tabs">
                <button class="tab-btn active" onclick="switchTab('text')">📝 Text Input</button>
                <button class="tab-btn" onclick="switchTab('url')">🔗 URL Input</button>
            </div>

            <div id="text-input" class="input-content active">
                <input type="text" id="article-title" placeholder="Article Title (optional)">
                <textarea id="article-text" placeholder="Paste article text here..."></textarea>
                <button class="analyze-btn" onclick="analyzeText()">🔍 Analyze Article</button>
            </div>

            <div id="url-input" class="input-content">
                <input type="text" id="article-url" placeholder="Enter article URL...">
                <button class="analyze-btn" onclick="analyzeUrl()">🔍 Analyze URL</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing article through 6-stage pipeline...</p>
        </div>

        <div class="result-section" id="result-section">
            <!-- Results will be inserted here -->
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.input-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-input').classList.add('active');
        }

        async function analyzeText() {
            const title = document.getElementById('article-title').value;
            const text = document.getElementById('article-text').value;

            if (!text.trim()) {
                alert('Please enter article text');
                return;
            }

            showLoading();

            try {
                const response = await fetch('/api/analyze/text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, text })
                });

                const result = await response.json();
                displayResult(result);
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        async function analyzeUrl() {
            const url = document.getElementById('article-url').value;

            if (!url.trim()) {
                alert('Please enter article URL');
                return;
            }

            showLoading();

            try {
                const response = await fetch('/api/analyze/url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const result = await response.json();
                displayResult(result);
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        function showLoading() {
            document.getElementById('loading').classList.add('show');
            document.getElementById('result-section').classList.remove('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        function displayResult(data) {
            if (!data.success) {
                alert('Error: ' + data.error);
                return;
            }

            const result = data.result;
            const details = data.details;
            const visual = data.visual;

            const statusClass = result.prediction === 'FAKE' ? 'fake' : 
                               result.prediction === 'REAL' ? 'real' : 'uncertain';

            const html = `
                <div class="result-header ${statusClass}">
                    <div class="result-icon">${visual.icon}</div>
                    <div class="result-status">${visual.status_text}</div>
                    <div class="result-confidence">Confidence: ${result.confidence}</div>
                    <div style="margin-top: 10px; font-size: 18px;">${result.verdict}</div>
                </div>

                <div class="result-details">
                    <div class="detail-card">
                        <h3>📰 Article Information</h3>
                        <div class="detail-item"><strong>Title:</strong> ${details.article.title}</div>
                        <div class="detail-item"><strong>Source:</strong> ${details.article.source}</div>
                        <div class="detail-item"><strong>Author:</strong> ${details.article.author}</div>
                    </div>

                    <div class="detail-card">
                        <h3>🤖 Analysis Details</h3>
                        <div class="detail-item"><strong>Model:</strong> ${details.analysis.model_type}</div>
                        <div class="detail-item">${details.analysis.interpretation}</div>
                    </div>

                    <div class="detail-card">
                        <h3>🔍 Verification</h3>
                        <div class="detail-item"><strong>Source Credibility:</strong> ${(details.verification.source_credibility * 100).toFixed(0)}%</div>
                        <div class="detail-item"><strong>Fact-Check:</strong> ${details.verification.fact_check_status}</div>
                    </div>
                </div>

                ${details.analysis.feature_signals && details.analysis.feature_signals.length > 0 ? `
                <div class="detail-card" style="margin-bottom: 20px;">
                    <h3>⚠️ Warning Signs Detected</h3>
                    <ul class="signal-list">
                        ${details.analysis.feature_signals.map(signal => `<li>• ${signal}</li>`).join('')}
                    </ul>
                </div>
                ` : ''}

                <div class="recommendations">
                    <h3>💡 Recommendations</h3>
                    <ul>
                        ${details.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                    </ul>
                </div>
            `;

            document.getElementById('result-section').innerHTML = html;
            document.getElementById('result-section').classList.add('show');
            document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
