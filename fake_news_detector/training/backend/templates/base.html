<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI-powered fake news detection tool using machine learning">
  <title>{% block title %}Fake News Detector{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand" style="text-decoration:none;">
        <span class="logo-icon">📰</span>
        <span class="logo-text">Fake News <span>Detector</span></span>
      </a>

      <nav class="navbar-menu">
        <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">Home</a>
        {% if username %}
        <a href="/past-predictions" class="nav-item {% if request.path in ['/history', '/past-predictions'] %}active{% endif %}">Past Predictions</a>
        <a href="/profile" class="nav-item {% if request.path == '/profile' %}active{% endif %}">Profile</a>
        {% endif %}
        <a href="/contact" class="nav-item {% if request.path == '/contact' %}active{% endif %}">Contact</a>
        {% if username %}
        <a href="/logout" class="btn-logout">Logout</a>
        {% else %}
        <a href="/login" class="nav-item {% if request.path == '/login' %}active{% endif %}">Login</a>
        <a href="/register" class="btn-primary-nav">Register</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  {% block extra_js %}{% endblock %}
</body>
</html>
