version: '3.8'

services:
  fake-news-detector:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NEWS_API_KEY=${NEWS_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
    volumes:
      - ./fake-news-detector/database:/app/fake-news-detector/database
      - ./fake-news-detector/logs:/app/fake-news-detector/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: PostgreSQL database for vector storage
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_DB=fake_news_detector
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: